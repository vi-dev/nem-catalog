schemaVersion: 1
name: mage
description: Make/rake-like build tool using Go
homepage: https://magefile.org
license: Apache-2.0

archive:
  fetch:
    github_release:
      repo: magefile/mage
      assetName: 'mage_{{.Version | trimPrefix "v"}}_{{.OS}}-{{.Arch}}.tar.gz'
      templateOverrides:
        linux: Linux
        darwin: macOS
        amd64: 64bit
        arm64: ARM64
      releaseFilter: '^(v\d+\.\d+\.\d+)$'
  verify:
    sha256GitHubAsset: 'mage_{{.Version | trimPrefix "v"}}_checksums.txt'

install:
  - extract:
      from: "{{.Archive}}"
      as: src
  - copy:
      from: "{{.Var.src}}/mage"
      to: "{{.InstallDir}}/bin/mage"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/mage", "--version"]
