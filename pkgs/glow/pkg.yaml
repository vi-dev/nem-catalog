schemaVersion: 1
name: glow
description: Render markdown on the CLI, with pizzazz!
homepage: https://github.com/charmbracelet/glow
license: MIT

archive:
  fetcher:
    github_release:
      repo: charmbracelet/glow
      assetName: 'glow_{{.Version | trimPrefix "v"}}_{{.OS}}_{{.Arch}}.tar.gz'
      templateOverrides:
        linux: Linux
        darwin: Darwin
        amd64: x86_64
  verify:
    sha256GitHubAsset: "checksums.txt"

install:
  - extract:
      from: "{{.Archive}}"
      as: src
      stripComponents: 1
  - copy:
      from: "{{.Var.src}}/glow"
      to: "{{.InstallDir}}/bin/glow"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/glow", "--version"]
