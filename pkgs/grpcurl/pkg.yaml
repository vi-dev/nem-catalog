schemaVersion: 1
name: grpcurl
description: Command-line tool for interacting with gRPC servers
homepage: https://github.com/fullstorydev/grpcurl
license: MIT

archive:
  fetcher:
    github_release:
      repo: fullstorydev/grpcurl
      assetName: 'grpcurl_{{.Version | trimPrefix "v"}}_{{.OS}}_{{.Arch}}.tar.gz'
      templateOverrides:
        darwin: osx
      releaseFilter: '^(v\d+\.\d+\.\d+)$'
  verify:
    sha256GitHubAsset: 'grpcurl_{{.Version | trimPrefix "v"}}_checksums.txt'

install:
  - extract:
      from: "{{.Archive}}"
      as: src
  - copy:
      from: "{{.Var.src}}/grpcurl"
      to: "{{.InstallDir}}/bin/grpcurl"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/grpcurl", "--version"]
