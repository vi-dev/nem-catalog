schemaVersion: 1
name: skopeo
description: Work with remote container images and registries
homepage: https://github.com/containers/skopeo
license: Apache-2.0

dependsOn:
  - go
  - gpgme      # libgpgme for signature verification (pulls gnupg + libassuan + libgpg-error)
  - pkgconf    # cgo resolves libgpgme via pkg-config

buildFromSource: true

source:
  fetch:
    github_tag:
      repo: containers/skopeo
      tagFilter: '^(v\d+\.\d+\.\d+)$'

versions:
  - version: v1.23.0
    source:
      verify:
        checksum: de96bfc2bb523c852af675ffdadd934484812ce190aa8620e1d5fd6c51442e25

build:
  - extract:
      from: "{{.Source}}"
      as: src
      stripComponents: 1
  - mkdir:
      path: "{{.StagingDir}}{{.InstallDir}}/bin"
  - mkdir:
      path: "{{.StagingDir}}/.gotmp"
  # No containers_image_openpgp tag => CGO links real libgpgme (signatures via gpg),
  # resolved through `#cgo pkg-config: gpgme` — hence PKG_CONFIG=pkgconf. nem puts each
  # dependency's lib/pkgconfig on PKG_CONFIG_PATH, so pkgconf finds gpgme.pc and its Requires.
  - run:
      cwd: "{{.Var.src}}"
      env:
        GOCACHE: "{{.StagingDir}}/.gocache"
        GOTMPDIR: "{{.StagingDir}}/.gotmp"
        GOPATH: "{{.StagingDir}}/.gopath"
        CGO_ENABLED: "1"
        GOTOOLCHAIN: local
        GOFLAGS: -mod=vendor
        PKG_CONFIG: pkgconf
      script: |
        go build -tags exclude_graphdriver_btrfs \
          -o "$NEM_STAGING_DIR$NEM_INSTALL_DIR/bin/skopeo" ./cmd/skopeo

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/skopeo", "--version"]
