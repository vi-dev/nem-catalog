schemaVersion: 1
name: kail
description: Kubernetes log viewer that tails logs from pods matching a selector
homepage: https://github.com/boz/kail
license: MIT

archive:
  fetcher:
    github_release:
      repo: boz/kail
      assetName: "kail_{{.Version}}_{{.OS}}_{{.Arch}}.tar.gz"
      releaseFilter: '^(v\d+\.\d+\.\d+)$'
  verify:
    sha256GitHubAsset: "checksums.txt"

install:
  - extract:
      from: "{{.Archive}}"
      as: src
  - copy:
      from: "{{.Var.src}}/kail"
      to: "{{.InstallDir}}/bin/kail"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/kail", "version"]
