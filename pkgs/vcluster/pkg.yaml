schemaVersion: 1
name: vcluster
description: Create lightweight, fully functional virtual Kubernetes clusters
homepage: https://www.vcluster.com
license: Apache-2.0

archive:
  fetch:
    github_release:
      repo: loft-sh/vcluster
      assetName: "vcluster-{{.OS}}-{{.Arch}}"
      releaseFilter: '^(v\d+\.\d+\.\d+)$'
  verify:
    sha256GitHubAsset: "checksums.txt"

install:
  - copy:
      from: "{{.Archive}}"
      to: "{{.InstallDir}}/bin/vcluster"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/vcluster", "--version"]
