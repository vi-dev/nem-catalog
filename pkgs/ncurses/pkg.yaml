schemaVersion: 1
name: ncurses
description: Library for writing text-based user interfaces in a terminal-independent way
homepage: https://invisible-island.net/ncurses/
license: X11

buildFromSource: true

binPaths:
  - bin

source:
  fetch:
    http:
      url: 'https://ftp.gnu.org/gnu/ncurses/ncurses-{{.Version}}.tar.gz'

versions:
  - version: "6.6"
    source:
      verify:
        checksum: 355b4cbbed880b0381a04c46617b7656e362585d52e9cf84a67e2009b749ff11

build:
  - extract:
      from: "{{.Source}}"
      as: src
      stripComponents: 1
  - mkdir:
      path: "{{.StagingDir}}/.tmp"
  # Wide-char shared build with pkg-config files and an ncursesw*-config script,
  # so dependents (readline, gnupg) can discover cflags/libs off PATH. Optional
  # bindings/tests/manpages are dropped to keep the build self-contained.
  - run:
      cwd: "{{.Var.src}}"
      env:
        TMPDIR: "{{.StagingDir}}/.tmp"
      script: |
        ./configure --prefix="$NEM_INSTALL_DIR" \
          --with-shared --enable-widec --enable-pc-files \
          --with-pkg-config-libdir="$NEM_INSTALL_DIR/lib/pkgconfig" \
          --without-ada --without-cxx-binding --without-tests \
          --without-manpages --without-debug --disable-stripping
        make
        make install DESTDIR="$NEM_STAGING_DIR"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/ncursesw6-config", "--version"]
