schemaVersion: 1
name: oras
description: Tool for managing OCI artifacts in container registries
homepage: https://oras.land
license: Apache-2.0

archive:
  fetch:
    github_release:
      repo: oras-project/oras
      assetName: 'oras_{{.Version | trimPrefix "v"}}_{{.OS}}_{{.Arch}}.tar.gz'
      releaseFilter: '^(v\d+\.\d+\.\d+)$'
  verify:
    sha256GitHubAsset: 'oras_{{.Version | trimPrefix "v"}}_checksums.txt'

install:
  - extract:
      from: "{{.Archive}}"
      as: src
  - copy:
      from: "{{.Var.src}}/oras"
      to: "{{.InstallDir}}/bin/oras"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/oras", "version"]
