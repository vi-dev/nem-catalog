schemaVersion: 1
name: rg
description: Recursively search directories for a regex pattern with ripgrep
homepage: https://github.com/BurntSushi/ripgrep
license: MIT OR Unlicense

archive:
  fetcher:
    github_release:
      repo: BurntSushi/ripgrep
      # ripgrep's libc varies by platform: linux/x86_64 is musl, linux/arm64
      # is gnu, and macOS is apple-darwin. Build the target triple per-platform.
      assetName: 'ripgrep-{{.Version}}-{{.Arch}}-{{if eq .OS "darwin"}}apple-darwin{{else}}{{if eq .Arch "x86_64"}}unknown-linux-musl{{else}}unknown-linux-gnu{{end}}{{end}}.tar.gz'
      templateOverrides:
        amd64: x86_64
        arm64: aarch64
      releaseFilter: '^(\d+\.\d+\.\d+)$'
      versionTemplate: "{{.Capture}}"
  verify:
    sha256GitHubAsset: 'ripgrep-{{.Version}}-{{.Arch}}-{{if eq .OS "darwin"}}apple-darwin{{else}}{{if eq .Arch "x86_64"}}unknown-linux-musl{{else}}unknown-linux-gnu{{end}}{{end}}.tar.gz.sha256'

install:
  - extract:
      from: "{{.Archive}}"
      as: src
      stripComponents: 1
  - copy:
      from: "{{.Var.src}}/rg"
      to: "{{.InstallDir}}/bin/rg"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/rg", "--version"]
