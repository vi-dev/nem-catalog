name: grype
description: A vulnerability scanner for container images and filesystems
homepage: https://github.com/anchore/grype
license: Apache-2.0

archive:
  fetcher:
    github_release:
      repo: anchore/grype
      assetName: 'grype_{{.Version | trimPrefix "v"}}_{{.OS}}_{{.Arch}}.tar.gz'
  verify:
    sha256GitHubAsset: 'grype_{{.Version | trimPrefix "v"}}_checksums.txt'

install:
  - extract:
      from: "{{.Archive}}"
      as: src
  - copy:
      from: "{{.Var.src}}/grype"
      to: "{{.InstallDir}}/bin/grype"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/grype", "version"]
