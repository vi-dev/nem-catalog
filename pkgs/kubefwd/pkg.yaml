schemaVersion: 1
name: kubefwd
description: Bulk port forwarding Kubernetes services for local development
homepage: https://github.com/txn2/kubefwd
license: Apache-2.0

archive:
  fetcher:
    github_release:
      repo: txn2/kubefwd
      assetName: "kubefwd_{{.OS}}_{{.Arch}}.tar.gz"
      templateOverrides:
        darwin: Darwin
        linux: Linux
        amd64: x86_64
      releaseFilter: '^(v\d+\.\d+\.\d+)$'
  verify:
    sha256GitHubAsset: "kubefwd_checksums.txt"

install:
  - extract:
      from: "{{.Archive}}"
      as: src
  - copy:
      from: "{{.Var.src}}/kubefwd"
      to: "{{.InstallDir}}/bin/kubefwd"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/kubefwd", "version"]
