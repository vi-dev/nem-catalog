schemaVersion: 1
name: node
description: Node.js JavaScript runtime
homepage: https://nodejs.org
license: MIT

archive:
  fetcher:
    http:
      url: 'https://nodejs.org/dist/v{{.Version | trimPrefix "v"}}/node-v{{.Version | trimPrefix "v"}}-{{.OS}}-{{.Arch}}.tar.gz'
      templateOverrides:
        amd64: x64
      versionsFrom:
        github_release:
          repo: nodejs/node
          releaseFilter: '^(v\d+\.\d+\.\d+)$'
  verify:
    sha256URL: 'https://nodejs.org/dist/v{{.Version | trimPrefix "v"}}/SHASUMS256.txt'

install:
  - extract:
      from: "{{.Archive}}"
      as: src
      stripComponents: 1
  - copy:
      from: "{{.Var.src}}"
      to: "{{.InstallDir}}"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/node", "--version"]
