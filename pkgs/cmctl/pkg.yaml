schemaVersion: 1
name: cmctl
description: Command-line tool to manage cert-manager resources in Kubernetes
homepage: https://cert-manager.io
license: Apache-2.0

archive:
  fetch:
    github_release:
      repo: cert-manager/cmctl
      assetName: "cmctl_{{.OS}}_{{.Arch}}.tar.gz"
      releaseFilter: '^(v\d+\.\d+\.\d+)$'
  verify:
    sha256GitHubAsset: "checksums.txt"

install:
  - extract:
      from: "{{.Archive}}"
      as: src
  - copy:
      from: "{{.Var.src}}/cmctl"
      to: "{{.InstallDir}}/bin/cmctl"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/cmctl", "version", "--client"]
