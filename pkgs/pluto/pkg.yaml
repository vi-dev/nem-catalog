schemaVersion: 1
name: pluto
description: Find deprecated and removed Kubernetes apiVersions in manifests and Helm charts
homepage: https://github.com/FairwindsOps/pluto
license: Apache-2.0

archive:
  fetch:
    github_release:
      repo: FairwindsOps/pluto
      assetName: 'pluto_{{.Version | trimPrefix "v"}}_{{.OS}}_{{.Arch}}.tar.gz'
      releaseFilter: '^(v\d+\.\d+\.\d+)$'
  verify:
    sha256GitHubAsset: "checksums.txt"

install:
  - extract:
      from: "{{.Archive}}"
      as: src
  - copy:
      from: "{{.Var.src}}/pluto"
      to: "{{.InstallDir}}/bin/pluto"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/pluto", "version"]
