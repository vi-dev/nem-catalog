schemaVersion: 1
name: kyverno
description: CLI for Kyverno, the Kubernetes-native policy management engine
homepage: https://kyverno.io
license: Apache-2.0

archive:
  fetcher:
    github_release:
      repo: kyverno/kyverno
      assetName: "kyverno-cli_{{.Version}}_{{.OS}}_{{.Arch}}.tar.gz"
      templateOverrides:
        amd64: x86_64
      releaseFilter: '^(v\d+\.\d+\.\d+)$'
  verify:
    sha256GitHubAsset: "checksums.txt"

install:
  - extract:
      from: "{{.Archive}}"
      as: src
  - copy:
      from: "{{.Var.src}}/kyverno"
      to: "{{.InstallDir}}/bin/kyverno"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/kyverno", "version"]
