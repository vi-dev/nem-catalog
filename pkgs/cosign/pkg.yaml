schemaVersion: 1
name: cosign
description: Code signing and transparency for containers and binaries
homepage: https://github.com/sigstore/cosign
license: Apache-2.0

archive:
  fetch:
    github_release:
      repo: sigstore/cosign
      assetName: "cosign-{{.OS}}-{{.Arch}}"
  verify:
    sha256GitHubAsset: "cosign_checksums.txt"

install:
  - copy:
      from: "{{.Archive}}"
      to: "{{.InstallDir}}/bin/cosign"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/cosign", "version"]