schemaVersion: 1
name: tflint
description: Pluggable linter for Terraform
homepage: https://github.com/terraform-linters/tflint
license: MPL-2.0

archive:
  fetch:
    github_release:
      repo: terraform-linters/tflint
      assetName: "tflint_{{.OS}}_{{.Arch}}.zip"
      releaseFilter: '^(v\d+\.\d+\.\d+)$'
  verify:
    sha256GitHubAsset: "checksums.txt"

install:
  - extract:
      from: "{{.Archive}}"
      as: src
  - copy:
      from: "{{.Var.src}}/tflint"
      to: "{{.InstallDir}}/bin/tflint"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/tflint", "--version"]
