schemaVersion: 1
name: fzf
description: Command-line fuzzy finder
homepage: https://github.com/junegunn/fzf
license: MIT

archive:
  fetcher:
    github_release:
      repo: junegunn/fzf
      assetName: 'fzf-{{.Version | trimPrefix "v"}}-{{.OS}}_{{.Arch}}.tar.gz'
      releaseFilter: '^(v\d+\.\d+\.\d+)$'
  verify:
    sha256GitHubAsset: 'fzf_{{.Version | trimPrefix "v"}}_checksums.txt'

install:
  - extract:
      from: "{{.Archive}}"
      as: src
  - copy:
      from: "{{.Var.src}}/fzf"
      to: "{{.InstallDir}}/bin/fzf"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/fzf", "--version"]
