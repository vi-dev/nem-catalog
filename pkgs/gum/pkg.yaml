schemaVersion: 1
name: gum
description: A tool for glamorous shell scripts
homepage: https://github.com/charmbracelet/gum
license: MIT

archive:
  fetch:
    github_release:
      repo: charmbracelet/gum
      assetName: 'gum_{{.Version | trimPrefix "v"}}_{{.OS}}_{{.Arch}}.tar.gz'
      templateOverrides:
        linux: Linux
        darwin: Darwin
        amd64: x86_64
  verify:
    sha256GitHubAsset: "checksums.txt"

install:
  - extract:
      from: "{{.Archive}}"
      as: src
      stripComponents: 1
  - copy:
      from: "{{.Var.src}}/gum"
      to: "{{.InstallDir}}/bin/gum"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/gum", "--version"]
