schemaVersion: 1
name: crane
description: Tool for managing container images, from the go-containerregistry project
homepage: https://github.com/google/go-containerregistry
license: Apache-2.0

archive:
  fetcher:
    github_release:
      repo: google/go-containerregistry
      assetName: "go-containerregistry_{{.OS}}_{{.Arch}}.tar.gz"
      templateOverrides:
        linux: Linux
        darwin: Darwin
        amd64: x86_64
  verify:
    sha256GitHubAsset: "checksums.txt"

install:
  - extract:
      from: "{{.Archive}}"
      as: src
  - copy:
      from: "{{.Var.src}}/crane"
      to: "{{.InstallDir}}/bin/crane"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/crane", "version"]