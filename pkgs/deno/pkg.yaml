schemaVersion: 1
name: deno
description: A modern runtime for JavaScript and TypeScript
homepage: https://deno.com
license: MIT

archive:
  fetcher:
    github_release:
      repo: denoland/deno
      assetName: "deno-{{.Arch}}-{{.OS}}.zip"
      templateOverrides:
        darwin: apple-darwin
        linux: unknown-linux-gnu
        amd64: x86_64
        arm64: aarch64
  verify:
    sha256GitHubAsset: "deno-{{.Arch}}-{{.OS}}.zip.sha256sum"

install:
  - extract:
      from: "{{.Archive}}"
      as: src
  - copy:
      from: "{{.Var.src}}/deno"
      to: "{{.InstallDir}}/bin/deno"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/deno", "--version"]
