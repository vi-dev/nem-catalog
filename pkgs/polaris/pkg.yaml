schemaVersion: 1
name: polaris
description: Validation of best practices in Kubernetes clusters and infrastructure as code
homepage: https://www.fairwinds.com/polaris
license: Apache-2.0

archive:
  fetcher:
    github_release:
      repo: FairwindsOps/polaris
      assetName: 'polaris_{{.Version | trimPrefix "v"}}_{{.OS}}_{{.Arch}}.tar.gz'
      releaseFilter: '^(v\d+\.\d+\.\d+)$'
  verify:
    sha256GitHubAsset: "checksums.txt"

install:
  - extract:
      from: "{{.Archive}}"
      as: src
  - copy:
      from: "{{.Var.src}}/polaris"
      to: "{{.InstallDir}}/bin/polaris"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/polaris", "version"]
