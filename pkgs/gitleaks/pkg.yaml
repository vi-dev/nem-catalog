schemaVersion: 1
name: gitleaks
description: Find secrets in git repos, files, and stdin
homepage: https://github.com/gitleaks/gitleaks
license: MIT

archive:
  fetch:
    github_release:
      repo: gitleaks/gitleaks
      assetName: 'gitleaks_{{.Version | trimPrefix "v"}}_{{.OS}}_{{.Arch}}.tar.gz'
      templateOverrides:
        amd64: x64
  verify:
    sha256GitHubAsset: 'gitleaks_{{.Version | trimPrefix "v"}}_checksums.txt'

install:
  - extract:
      from: "{{.Archive}}"
      as: src
  - copy:
      from: "{{.Var.src}}/gitleaks"
      to: "{{.InstallDir}}/bin/gitleaks"

test:
  - run:
      cmd: ["{{.InstallDir}}/bin/gitleaks", "version"]