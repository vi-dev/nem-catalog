name: Setup nem
description: Install nem onto PATH — a pinned release via install.sh, or 'unstable' built from main.

inputs:
  version:
    description: nem release tag to install, or 'unstable' to build the latest main from source.
    required: true

runs:
  using: composite
  steps:
    - name: Set up Go
      if: inputs.version == 'unstable'
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
      with:
        go-version: stable

    - name: Build nem from main
      if: inputs.version == 'unstable'
      shell: bash
      env:
        GOBIN: ${{ runner.temp }}/nem-bin
      run: |
        set -euo pipefail
        go install github.com/vi-dev/nem@main
        echo "${GOBIN}" >> "${GITHUB_PATH}"
        "${GOBIN}/nem" version

    - name: Install nem ${{ inputs.version }}
      if: inputs.version != 'unstable'
      shell: bash
      env:
        NEM_VERSION: ${{ inputs.version }}
        NEM_INSTALL_DIR: ${{ runner.temp }}/nem-bin
      run: |
        set -euo pipefail
        curl -fsSL "https://raw.githubusercontent.com/vi-dev/nem/${NEM_VERSION}/install.sh" | bash
        echo "${NEM_INSTALL_DIR}" >> "${GITHUB_PATH}"
        "${NEM_INSTALL_DIR}/nem" version
